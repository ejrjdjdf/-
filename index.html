<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth & RTDB</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f4f7f6; color: #333; }
        .container { max-width: 450px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0288d1; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #01579b; }
        .hidden { display: none; }
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; font-weight: bold; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>Firebase Авторизація та База Даних</h2>
    
    <div id="status-box" class="status hidden"></div>

    <div id="auth-section">
        <input type="email" id="email" placeholder="Електронна пошта">
        <input type="password" id="password" placeholder="Пароль">
        <button id="btn-login">Увійти</button>
        <button id="btn-register" style="background: #4caf50;">Зареєструватися</button>
    </div>

    <div id="user-section" class="hidden">
        <h3>Вітаємо, <span id="user-email"></span>!</h3>
        <p>Ваш UID: <small id="user-uid"></small></p>
        
        <hr>
        <input type="text" id="db-data" placeholder="Введіть секретне повідомлення">
        <button id="btn-save-db" style="background: #ff9800;">Зберегти в базу даних</button>
        
        <hr>
        <button id="btn-logout" style="background: #e53935;">Вийти з акаунта</button>
    </div>
</div>

<!-- Завантажуємо базові скрипти без defer і модуля, як класичний текст -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // Запускаємо код СТРОГО після того, як браузер завантажить усі файли зверху
    window.onload = function() {
        const firebaseConfig = {
            apiKey: "AIzaSyBghCGHAkUDX9S3-7dmLJmp0YyZt3bZ4dU",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "a12dgf-a618",
            storageBucket: "a12dgf-a618.firebasestorage.app",
            messagingSenderId: "340310261347",
            appId: "1:340310261347:web:4634f37be1f25a6f9d4256",
            measurementId: "G-PL4X9DN63R"
        };

        // Тепер об'єкт 'firebase' 100% існує в ОЗУ комп'ютера
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Слідкуємо за станом користувача
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-uid').innerText = user.uid;
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('user-section').classList.add('hidden');
            }
        });

        // Реєстрація
        document.getElementById('btn-register').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            showStatus('Реєстрація...', 'success');
            
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => showStatus('Акаунт успішно створено!', 'success'))
                .catch((error) => showStatus('Помилка реєстрації: ' + error.message, 'error'));
        });

        // Вхід
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            showStatus('Перевірка даних...', 'success');
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => showStatus('Успішний вхід!', 'success'))
                .catch((error) => showStatus('Помилка входу: ' + error.message, 'error'));
        });

        // Запис у базу
        document.getElementById('btn-save-db').addEventListener('click', () => {
            const text = document.getElementById('db-data').value;
            const user = auth.currentUser;

            if (!user) {
                showStatus('Помилка: Ви не авторизовані!', 'error');
                return;
            }

            db.ref('users/' + user.uid).set({
                secretMessage: text,
                lastUpdated: new Date().toISOString()
            })
            .then(() => showStatus('Дані збережено в папку: /users/' + user.uid, 'success'))
            .catch((error) => showStatus('Помилка бази даних: ' + error.message, 'error'));
        });

        // Вихід
        document.getElementById('btn-logout').addEventListener('click', () => {
            auth.signOut()
                .then(() => showStatus('Ви вийшли з системи.', 'success'))
                .catch((error) => showStatus('Помилка виходу: ' + error.message, 'error'));
        });

        function showStatus(text, type) {
            const box = document.getElementById('status-box');
            box.innerText = text;
            box.className = `status ${type}`;
            box.classList.remove('hidden');
        }
    };
</script>
</body>
</html>
